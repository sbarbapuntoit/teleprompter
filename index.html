<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teleprompter Sbarba</title>
<!-- l'icona in Home deve aprire il VERO Safari: nel contenitore "web app" di iOS
     il riconoscimento vocale non funziona -->
<link rel="manifest" href='data:application/manifest+json,{"name":"Teleprompter","display":"browser"}'>
<style>
  :root { --fs: 42px; --accent: #ffd54a; --ink: #f2f2f2; --bg: #050505; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif; }

  /* barra di avanzamento dello script */
  #progress { position:fixed; top:0; left:0; height:3px; width:0; background:var(--accent);
              z-index:40; transition:width .3s ease; }

  /* barra comandi in vetro smerigliato */
  #toolbar { position:fixed; top:0; left:0; right:0; display:flex; gap:8px; align-items:center;
             padding:10px 12px; background:rgba(16,16,16,.72);
             -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
             border-bottom:1px solid rgba(255,255,255,.07); z-index:30; flex-wrap:wrap;
             transition:transform .3s ease; }
  body.cinema #toolbar { transform:translateY(-110%); }
  button { background:rgba(255,255,255,.08); color:var(--ink); border:1px solid rgba(255,255,255,.09);
           border-radius:10px; padding:10px 14px; font-size:16px; cursor:pointer;
           transition:background .15s, border-color .15s; }
  button:hover { background:rgba(255,255,255,.16); }
  button:active { background:rgba(255,255,255,.24); }
  button:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  button.on { border-color:var(--accent); color:var(--accent); }
  #btnMic.on { border-color:#ff5252; color:#ff5252; }
  #status { width:14px; height:14px; border-radius:50%; background:#666; flex:none; transition:background .2s; }
  #status.following, #statusC.following { background:#35d05f; box-shadow:0 0 12px rgba(53,208,95,.7); animation:pulse 1.6s ease-in-out infinite; }
  #status.waiting, #statusC.waiting { background:#ff9f1a; box-shadow:0 0 12px rgba(255,159,26,.6); animation:none; }
  @keyframes pulse { 50% { opacity:.55; } }
  #fileName { font-size:13px; opacity:.55; }
  #msg { width:100%; font-size:13px; color:#ff9f1a; }

  /* pillola comandi in modalità tutto schermo */
  #cinemaBar { position:fixed; top:10px; right:10px; z-index:50; display:none; align-items:center; gap:10px;
               background:rgba(16,16,16,.55); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
               padding:6px 8px 6px 14px; border-radius:999px; opacity:.35; transition:opacity .2s; }
  #cinemaBar:hover, #cinemaBar:active { opacity:1; }
  body.cinema #cinemaBar { display:flex; }
  #statusC { width:14px; height:14px; border-radius:50%; background:#666; }
  #cinemaBar button { padding:6px 10px; border-radius:999px; }

  /* il testo */
  #script { padding:45vh 8vw 50vh; font-size:var(--fs); line-height:1.7; font-weight:500; }
  #script.mirror { transform:scaleX(-1); }
  #script p { margin:0 0 1.1em; }
  .w { color:var(--ink); opacity:1; transition:color .18s ease, opacity .3s ease, text-shadow .18s ease; }
  .w.read { opacity:.22; }
  .w.current { color:var(--accent); text-shadow:0 0 18px rgba(255,213,74,.45); }

  /* guida di lettura e dissolvenze */
  #guide { position:fixed; left:1.6vw; top:50vh; transform:translateY(-50%); color:var(--accent);
           opacity:.45; font-size:20px; pointer-events:none; z-index:6; }
  #fadeTop, #fadeBottom { position:fixed; left:0; right:0; height:17vh; pointer-events:none; z-index:5; }
  #fadeTop { top:0; background:linear-gradient(rgba(5,5,5,.97), rgba(5,5,5,0)); }
  #fadeBottom { bottom:0; background:linear-gradient(rgba(5,5,5,0), rgba(5,5,5,.97)); }

  #simPanel { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; padding:8px; display:flex; gap:8px; z-index:30; }
  #simPanel input { flex:1; font-size:16px; padding:8px; background:#0d0d0d; color:var(--ink);
                    border:1px solid #3a3a3a; border-radius:8px; }
  body.cinema #simPanel { display:none; }

  @media (prefers-reduced-motion: reduce) {
    * { transition:none !important; animation:none !important; }
  }
</style>
</head>
<body>
<div id="progress"></div>
<div id="toolbar">
  <span id="status" title="stato"></span>
  <button id="btnOpen">📂 Apri script</button>
  <input type="file" id="fileInput" accept=".txt,.md" hidden>
  <button id="btnMic" hidden>🎤 Avvia</button>
  <button id="btnSlower" hidden>🐢 −</button>
  <button id="btnFaster" hidden>🐇 +</button>
  <button id="btnRestart" title="Ricomincia">⏮</button>
  <button id="btnPrev" title="Paragrafo precedente">↑¶</button>
  <button id="btnNext" title="Paragrafo successivo">↓¶</button>
  <button id="btnSmaller">A−</button>
  <button id="btnBigger">A+</button>
  <button id="btnMirror" title="Specchio">🪞</button>
  <button id="btnCinema" title="Tutto schermo (F)">⛶</button>
  <span id="fileName"></span>
  <span id="msg" hidden></span>
</div>
<div id="cinemaBar">
  <span id="statusC"></span>
  <button id="btnCinemaExit" title="Esci (Esc)">✕</button>
</div>
<div id="guide">▶</div>
<div id="fadeTop"></div>
<div id="fadeBottom"></div>
<div id="script"><p style="opacity:.5">Apri uno script (📂), poi premi 🎤 e inizia a leggere. Spazio o tocco sul testo = pausa/riprendi. ⛶ = tutto schermo.</p></div>
<div id="simPanel" hidden>
  <button id="simRead">▶ Leggi 5 parole</button>
  <button id="simOff">💬 A braccio</button>
  <input id="simInput" placeholder="scrivi parole e premi Invio">
</div>
<script>
// src/engine.js — motore di inseguimento vocale (puro, senza DOM)
(function (root, factory) {
  if (typeof module === 'object' && module.exports) module.exports = factory();
  else root.TeleEngine = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  function normalize(word) {
    return word
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]/g, '');
  }

  function tokenize(text) {
    const tokens = [];
    text.split(/\n\s*\n/).forEach((p, pi) => {
      p.split(/\s+/).forEach((w) => {
        const norm = normalize(w);
        if (norm) tokens.push({ text: w, norm, par: pi });
      });
    });
    return tokens;
  }

  function editDistance(a, b, max) {
    if (Math.abs(a.length - b.length) > max) return max + 1;
    let prev = [], cur = [];
    for (let j = 0; j <= b.length; j++) prev[j] = j;
    for (let i = 1; i <= a.length; i++) {
      cur[0] = i;
      let rowMin = cur[0];
      for (let j = 1; j <= b.length; j++) {
        cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
        rowMin = Math.min(rowMin, cur[j]);
      }
      if (rowMin > max) return max + 1;
      [prev, cur] = [cur, prev];
    }
    return prev[b.length];
  }

  function fuzzyMatch(a, b) {
    if (a === b) return true;
    const len = Math.max(a.length, b.length);
    if (len <= 3) return false;
    const max = len >= 7 ? 2 : 1;
    return editDistance(a, b, max) <= max;
  }

  const WINDOW = 25, MISS_LIMIT = 4, RELOCK_SCORE = 2.0;

  // parole italiane troppo comuni per fare da prova forte
  const STOPWORDS = new Set(('anche allora ancora avere bene cioe come cosa cosi ecco della delle dello ' +
    'dopo dove essere fare fatto infatti insomma loro meno mentre molto nella nelle nello niente nulla ' +
    'ogni oggi oppure perche pero poco prima proprio quando quasi quella quelle quello questa queste ' +
    'questo quindi sempre senza sono stato sulla sulle tanto tutta tutte tutti tutto vediamo verso volta').split(' '));

  class Tracker {
    constructor(tokens) {
      this.tokens = tokens;
      this.position = -1;
      this.state = 'following';
      this.missStreak = 0;
      this.candidate = null; // {index, score} durante il riaggancio
      this.lastHint = null;  // {norm, advancedTo} ultima parola provvisoria usata
      this.freq = {};        // occorrenze di ogni parola normalizzata nello script
      tokens.forEach((t) => { this.freq[t.norm] = (this.freq[t.norm] || 0) + 1; });
    }
    // quanto "vale" una parola come prova: lunga e rara = oro, corta e comune = quasi niente
    _weight(norm) {
      const len = norm.length;
      const lenF = len >= 8 ? 1 : len >= 6 ? 0.85 : len >= 4 ? 0.6 : 0.2;
      const c = this.freq[norm] || 1;
      const freqF = c <= 1 ? 1 : c === 2 ? 0.8 : c <= 4 ? 0.55 : 0.35;
      return lenF * freqF * (STOPWORDS.has(norm) ? 0.5 : 1);
    }
    _findRange(norm, from, to) {
      const end = Math.min(to, this.tokens.length);
      for (let i = Math.max(0, from); i < end; i++)
        if (fuzzyMatch(norm, this.tokens[i].norm)) return i;
      return -1;
    }
    _findInWindow(norm, from) { return this._findRange(norm, from, from + WINDOW); }
    // inizio di una possibile striscia: prima vicino, poi avanti lontano, poi indietro
    _startCandidate(norm) {
      const near = this._findInWindow(norm, this.position + 1);
      if (near >= 0) return near;
      const ahead = this._findRange(norm, this.position + 1 + WINDOW, this.tokens.length);
      if (ahead >= 0) return ahead;
      return this._findRange(norm, 0, this.position + 1);
    }
    _updateCandidate(norm) {
      const w = this._weight(norm);
      if (this.candidate) {
        const next = this._findRange(norm, this.candidate.index + 1, this.candidate.index + 4);
        if (next >= 0) { this.candidate = { index: next, score: this.candidate.score + w }; return; }
      }
      const start = this._startCandidate(norm);
      this.candidate = start >= 0 ? { index: start, score: w } : null;
    }
    _relock() {
      this.position = this.candidate.index;
      this.state = 'following';
      this.missStreak = 0;
      this.candidate = null;
    }
    // parola provvisoria del riconoscimento: può solo far fare il passo sicuro
    // (1-3 parole adiacenti), mai miss, mai salti, mai cambio di stato
    feedHint(raw) {
      const norm = normalize(raw);
      if (!norm || this.state !== 'following') return { position: this.position, state: this.state };
      if (this.lastHint && this.lastHint.norm === norm && this.lastHint.advancedTo === this.position) {
        return { position: this.position, state: this.state }; // già applicata
      }
      const hit = this._findRange(norm, this.position + 1, this.position + 4);
      if (hit >= 0) this.position = hit;
      this.lastHint = { norm, advancedTo: hit >= 0 ? hit : null };
      return { position: this.position, state: this.state };
    }
    feedWord(raw) {
      const norm = normalize(raw);
      if (!norm) return { position: this.position, state: this.state };
      // conferma stabile di una provvisoria già applicata: niente doppio passo
      if (this.lastHint) {
        const h = this.lastHint;
        this.lastHint = null;
        if (h.norm === norm && h.advancedTo !== null && this.position === h.advancedTo) {
          return { position: this.position, state: this.state };
        }
      }
      // parole corte ("e", "del", "una"): troppo comuni per fare da prova.
      // Possono solo far avanzare di poco se combaciano subito; mai miss, mai salti.
      if (norm.length <= 3) {
        if (this.state === 'following') {
          const hit = this._findRange(norm, this.position + 1, this.position + 4);
          if (hit >= 0) this.position = hit;
        }
        return { position: this.position, state: this.state };
      }
      if (this.state === 'following') {
        const hit = this._findInWindow(norm, this.position + 1);
        if (hit >= 0 && (hit - this.position <= 8 || this._weight(norm) >= 0.5)) {
          this.position = hit; this.missStreak = 0; this.candidate = null;
        } else if (hit >= 0) {
          // parola comune che riecheggia lontano nella finestra: eco, non prova
        } else {
          this.missStreak++;
          this._updateCandidate(norm);
          if (this.candidate && this.candidate.score >= RELOCK_SCORE) this._relock();
          else if (this.missStreak >= MISS_LIMIT) this.state = 'waiting';
        }
      } else {
        this._updateCandidate(norm);
        if (this.candidate && this.candidate.score >= RELOCK_SCORE) this._relock();
      }
      return { position: this.position, state: this.state };
    }
    jumpTo(index) {
      this.position = Math.max(-1, Math.min(index, this.tokens.length - 1));
      this.state = 'following';
      this.missStreak = 0;
      this.candidate = null;
      this.lastHint = null;
    }
  }

  return { normalize, tokenize, editDistance, fuzzyMatch, Tracker, WINDOW, MISS_LIMIT, RELOCK_SCORE };
});
</script>
<script>
const $ = (id) => document.getElementById(id);
const { tokenize, Tracker } = TeleEngine;
let tokens = [], tracker = null, spans = [], mic = null;

function loadText(text, name) {
  tokens = tokenize(text);
  tracker = new Tracker(tokens);
  renderScript();
  try { localStorage.setItem('tp_text', text); localStorage.setItem('tp_name', name || ''); } catch (e) {}
  $('fileName').textContent = name || '';
  window.scrollTo(0, 0);
  updateView();
}

function renderScript() {
  const el = $('script');
  el.innerHTML = '';
  spans = [];
  let curPar = -1, p = null;
  tokens.forEach((t) => {
    if (t.par !== curPar) { curPar = t.par; p = document.createElement('p'); el.appendChild(p); }
    const s = document.createElement('span');
    s.className = 'w';
    s.textContent = t.text;
    spans.push(s);
    p.appendChild(s);
    p.appendChild(document.createTextNode(' '));
  });
}

// scroll morbido: il bersaglio si aggiorna a ogni parola, l'animazione insegue senza ripartire
let scrollTargetY = null, scrollAnimating = false;
function scrollStep() {
  if (scrollTargetY === null) { scrollAnimating = false; return; }
  const d = scrollTargetY - window.scrollY;
  if (Math.abs(d) < 0.5) { scrollTargetY = null; scrollAnimating = false; return; }
  window.scrollBy(0, d * 0.18);
  requestAnimationFrame(scrollStep);
}
function scrollToCurrent(idx) {
  const s = spans[idx];
  if (!s) return;
  scrollTargetY = window.scrollY + s.getBoundingClientRect().top - window.innerHeight * 0.5;
  if (!scrollAnimating) { scrollAnimating = true; requestAnimationFrame(scrollStep); }
}
function updateView() {
  if (!tracker) return;
  const pos = tracker.position;
  // anticipo da karaoke: la parola "corrente" è quella DOPO l'ultima riconosciuta,
  // cioè quella che si sta pronunciando adesso
  const cur = pos >= 0 ? Math.min(pos + 1, spans.length - 1) : -1;
  spans.forEach((s, i) => {
    s.classList.toggle('read', i <= pos && i !== cur);
    s.classList.toggle('current', i === cur);
  });
  const stato = (mic && mic.active) ? tracker.state : '';
  $('status').className = stato;
  $('statusC').className = stato;
  $('progress').style.width = spans.length ? (Math.max(0, pos + 1) / spans.length * 100) + '%' : '0';
  if (cur >= 0) scrollToCurrent(cur);
  else scrollTargetY = null;
}

function feed(word) { if (tracker) { tracker.feedWord(word); updateView(); } }
function feedHint(word) { if (tracker) { tracker.feedHint(word); updateView(); } }

function jumpPar(dir) {
  if (!tracker || !tokens.length) return;
  const curPar = tokens[Math.max(0, tracker.position)].par;
  const idx = tokens.findIndex(t => t.par === curPar + dir);
  if (idx >= 0) { tracker.jumpTo(idx); updateView(); }
}

// --- caricamento file + drag&drop ---
$('btnOpen').onclick = () => $('fileInput').click();
$('fileInput').onchange = (e) => {
  const f = e.target.files[0];
  if (f) f.text().then(t => loadText(t, f.name));
  e.target.value = '';
};
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f) f.text().then(t => loadText(t, f.name));
});

// --- controlli ---
$('btnRestart').onclick = () => { if (tracker) { tracker.jumpTo(-1); window.scrollTo({top:0, behavior:'smooth'}); updateView(); } };
$('btnPrev').onclick = () => jumpPar(-1);
$('btnNext').onclick = () => jumpPar(1);

let fs = parseInt(localStorage.getItem('tp_fs')) || 42;
function applyFs() { document.documentElement.style.setProperty('--fs', fs + 'px'); try { localStorage.setItem('tp_fs', fs); } catch (e) {} }
$('btnSmaller').onclick = () => { fs = Math.max(20, fs - 4); applyFs(); };
$('btnBigger').onclick = () => { fs = Math.min(90, fs + 4); applyFs(); };
applyFs();

let mirror = localStorage.getItem('tp_mirror') === '1';
function applyMirror() {
  $('script').classList.toggle('mirror', mirror);
  $('btnMirror').classList.toggle('on', mirror);
  try { localStorage.setItem('tp_mirror', mirror ? '1' : '0'); } catch (e) {}
}
$('btnMirror').onclick = () => { mirror = !mirror; applyMirror(); };
applyMirror();

// --- modalità tutto schermo (cinema) ---
function setCinema(on) {
  document.body.classList.toggle('cinema', on);
  $('btnCinema').classList.toggle('on', on);
  if (on && document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else if (!on && document.fullscreenElement && document.exitFullscreen) {
    document.exitFullscreen().catch(() => {});
  }
}
function isCinema() { return document.body.classList.contains('cinema'); }
$('btnCinema').onclick = () => setCinema(!isCinema());
$('btnCinemaExit').onclick = () => setCinema(false);

function togglePlay() {
  if (mic) {
    if (mic.active) { mic.stop(); $('btnMic').textContent = '🎤 Avvia'; $('btnMic').classList.remove('on'); }
    else { mic.start(); $('btnMic').textContent = '⏸ Pausa'; $('btnMic').classList.add('on'); }
    updateView();
  } else {
    manual.on = !manual.on;
    manual.last = 0;
    if (manual.on) requestAnimationFrame(manualLoop);
  }
  syncWakeLock();
}

// schermo sempre acceso mentre si legge (wake lock), rilasciato in pausa
let wakeLock = null;
function isRunning() { return (mic && mic.active) || manual.on; }
async function syncWakeLock() {
  if (isRunning() && !wakeLock && navigator.wakeLock) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (e) {}
  } else if (!isRunning() && wakeLock) {
    wakeLock.release();
    wakeLock = null;
  }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') syncWakeLock();
});

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowUp') { e.preventDefault(); jumpPar(-1); }
  if (e.code === 'ArrowDown') { e.preventDefault(); jumpPar(1); }
  if (e.code === 'KeyF') { e.preventDefault(); setCinema(!isCinema()); }
  if (e.code === 'Escape' && isCinema()) setCinema(false);
});
$('script').addEventListener('click', togglePlay);
$('btnMic').onclick = togglePlay;

// --- fallback manuale (browser senza riconoscimento vocale) ---
let manual = { on:false, speed:60, last:0 };
function manualLoop(ts) {
  if (!manual.on) return;
  if (manual.last) window.scrollBy(0, manual.speed * (ts - manual.last) / 1000);
  manual.last = ts;
  requestAnimationFrame(manualLoop);
}
$('btnSlower').onclick = () => { manual.speed = Math.max(10, manual.speed - 10); };
$('btnFaster').onclick = () => { manual.speed = Math.min(300, manual.speed + 10); };

function showMsg(t) { const m = $('msg'); m.textContent = t; m.hidden = !t; }

// quando il microfono è bloccato per sempre (permessi/iframe), si passa al manuale
function enableManualFallback() {
  mic = null;
  $('btnMic').hidden = true;
  $('btnSlower').hidden = false;
  $('btnFaster').hidden = false;
}

// --- avvio ---
const saved = localStorage.getItem('tp_text');
if (saved) loadText(saved, localStorage.getItem('tp_name') || '');

function createRecognizer(onWord, onHint, onChange) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.lang = 'it-IT';
  rec.continuous = true;
  rec.interimResults = true;
  let wanted = false;
  let consumed = {}; // per result index: parole già inviate al motore
  rec.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const res = e.results[i];
      const words = res[0].transcript.trim().split(/\s+/).filter(Boolean);
      // nei risultati provvisori l'ultima parola può ancora cambiare: si aspetta
      const stable = res.isFinal ? words.length : Math.max(0, words.length - 1);
      for (let k = consumed[i] || 0; k < stable; k++) onWord(words[k]);
      consumed[i] = Math.max(consumed[i] || 0, stable);
      // l'ultima parola provvisoria viene passata come "suggerimento" a basso rischio
      if (!res.isFinal && words.length > 0 && consumed[i] === words.length - 1) {
        onHint(words[words.length - 1]);
      }
    }
  };
  rec.onend = () => { consumed = {}; if (wanted) { try { rec.start(); } catch (e) {} } else onChange(); };
  const FATAL = {
    'not-allowed': 'Permesso microfono negato dal browser (not-allowed).',
    'service-not-allowed': 'Servizio di dettatura non disponibile (service-not-allowed).',
    'audio-capture': 'Microfono non trovato o occupato da un\'altra app (audio-capture).'
  };
  rec.onerror = (e) => {
    if (FATAL[e.error]) {
      wanted = false;
      showMsg(FATAL[e.error] + ' Passo alla modalità manuale: spazio o tocco = via/pausa, 🐢/🐇 = velocità.');
      enableManualFallback();
      onChange();
    }
  };
  return {
    start() { wanted = true; showMsg(''); try { rec.start(); } catch (e) {} },
    stop() { wanted = false; try { rec.stop(); } catch (e) {} },
    get active() { return wanted; }
  };
}

mic = createRecognizer(feed, feedHint, updateView);
if (mic) {
  $('btnMic').hidden = false;
} else {
  $('btnSlower').hidden = false;
  $('btnFaster').hidden = false;
  showMsg('Questo browser non ha il riconoscimento vocale: modalità manuale (spazio = via/pausa, 🐢/🐇 = velocità).');
}

// --- modalità simulazione (?sim) ---
if (/[?&]sim/.test(location.search)) {
  $('simPanel').hidden = false;
  $('simRead').onclick = () => {
    for (let k = 0; k < 5; k++) { const t = tokens[tracker ? tracker.position + 1 : 0]; if (t) feed(t.text); }
  };
  $('simOff').onclick = () => ['allora','volevo','raccontarvi','una','cosa'].forEach(feed);
  $('simInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.target.value.trim().split(/\s+/).forEach(feed); e.target.value = ''; }
  });
}
</script>
